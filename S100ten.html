<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xy座標マスター！</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 15px;
      background-color: #f0f4f8;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin: 0 0 15px 0;
      font-size: 1.6rem;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      align-items: flex-start;
    }
    .controls {
      flex: 1 1 280px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .mode-select {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mode-select label {
      font-weight: bold;
      color: #2c3e50;
    }
    select {
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: 2px solid #3498db;
      background: white;
      font-weight: bold;
      color: #2c3e50;
      cursor: pointer;
    }
    .quiz-card {
      background: #eef6fb;
      border: 2px solid #b2d6ec;
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .quiz-q-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #2c3e50;
      text-align: center;
      line-height: 1.4;
    }
    .coord-target {
      color: #e74c3c;
      font-size: 1.4rem;
    }
    .input-group {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .input-group input {
      width: 55px;
      padding: 6px;
      font-size: 1.1rem;
      text-align: center;
      border: 2px solid #3498db;
      border-radius: 6px;
    }
    .btn {
      padding: 10px 15px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-success { background: #2ecc71; color: white; }
    .btn-success:hover { background: #27ae60; }

    .result-msg {
      font-weight: bold;
      font-size: 1rem;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      line-height: 1.4;
    }
    .result-correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .result-wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .result-complete { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; font-size: 1.1rem; }

    .canvas-container {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
    }
    canvas {
      border: 2px solid #bdc3c7;
      border-radius: 8px;
      background-color: #ffffff;
      touch-action: none;
      cursor: crosshair;
    }
    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #2ecc71;
      width: 0%;
      transition: width 0.3s;
    }
    .stage-badge {
      font-size: 0.85rem;
      color: #e67e22;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>📍 xy座標マスター！</h1>

  <div class="container">
    <div class="controls">
      <!-- モード選択 -->
      <div class="mode-select">
        <label for="modeSelect">学習モードを選ぶ：</label>
        <select id="modeSelect">
          <option value="click">❶ 座標の場所をクリック</option>
          <option value="type">❷ 点の座標を答える</option>
          <option value="art">❸ 点つなぎでお絵描き！</option>
        </select>
      </div>

      <!-- 出題カード -->
      <div class="quiz-card">
        <div id="quizQText" class="quiz-q-text">問題を読み込み中...</div>

        <!-- Mode 2用 入力フォーム -->
        <div id="typeInputs" class="input-group" style="display: none;">
          ( <input type="number" id="inputX" placeholder="x"> , <input type="number" id="inputY" placeholder="y"> )
        </div>

        <!-- Mode 3用 進捗表示 -->
        <div id="artProgress" style="display: none;">
          <div id="stageBadge" class="stage-badge">ステージ 1/5</div>
          <div class="progress-bar" style="margin-top:4px;"><div id="progressFill" class="progress-fill"></div></div>
          <div style="font-size:0.85rem; text-align:right; margin-top:4px; color:#7f8c8d;">
            完成まで: <span id="artStepText">0/0</span>
          </div>
        </div>

        <button id="btnSubmit" class="btn btn-primary" style="display: none;">解答する</button>
        <button id="btnNext" class="btn btn-success" style="display: none;">次の問題へ ➔</button>

        <div id="resultMsg" class="result-msg" style="display: none;"></div>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="graphCanvas" width="460" height="460"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    const modeSelect = document.getElementById('modeSelect');
    const quizQText = document.getElementById('quizQText');
    const typeInputs = document.getElementById('typeInputs');
    const artProgress = document.getElementById('artProgress');
    const progressFill = document.getElementById('progressFill');
    const artStepText = document.getElementById('artStepText');
    const stageBadge = document.getElementById('stageBadge');
    const inputX = document.getElementById('inputX');
    const inputY = document.getElementById('inputY');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnNext = document.getElementById('btnNext');
    const resultMsg = document.getElementById('resultMsg');

    const gridRange = 7; // -7 〜 +7
    const scale = canvas.width / (gridRange * 2 + 2);
    const originX = canvas.width / 2;
    const originY = canvas.height / 2;

    // 点つなぎ用データセット（全5種類）
    const masterArtData = [
      {
        name: "おうち",
        points: [
          {x: 0, y: 5}, {x: -4, y: 1}, {x: -3, y: 1}, {x: -3, y: -5},
          {x: 3, y: -5}, {x: 3, y: 1}, {x: 4, y: 1}, {x: 0, y: 5},
          {x: -1, y: -5}, {x: -1, y: -2}, {x: 1, y: -2}, {x: 1, y: -5}
        ]
      },
      {
        name: "大きな星",
        points: [
          {x: 0, y: 6}, {x: 2, y: 2}, {x: 6, y: 2}, {x: 3, y: -1},
          {x: 4, y: -5}, {x: 0, y: -3}, {x: -4, y: -5}, {x: -3, y: -1},
          {x: -6, y: 2}, {x: -2, y: 2}, {x: 0, y: 6}
        ]
      },
      {
        name: "ヨット",
        points: [
          {x: 0, y: 5}, {x: 0, y: -1}, {x: 5, y: -1}, {x: 0, y: 5},
          {x: -4, y: -2}, {x: 4, y: -2}, {x: 2, y: -5}, {x: -2, y: -5}, {x: -4, y: -2}
        ]
      },
      {
        name: "ねこ",
        points: [
          {x: -2, y: 3}, {x: -4, y: 6}, {x: -1, y: 4}, {x: 1, y: 4},
          {x: 4, y: 6}, {x: 2, y: 3}, {x: 3, y: 0}, {x: 2, y: -3},
          {x: -2, y: -3}, {x: -3, y: 0}, {x: -2, y: 3}
        ]
      },
      {
        name: "ロケット",
        points: [
          {x: 0, y: 6}, {x: 2, y: 3}, {x: 2, y: -3}, {x: 4, y: -5},
          {x: 2, y: -5}, {x: 0, y: -3}, {x: -2, y: -5}, {x: -4, y: -5},
          {x: -2, y: -3}, {x: -2, y: 3}, {x: 0, y: 6}
        ]
      }
    ];

    // 点つなぎの進行状況を管理
    let artQueue = [];       // 残りの絵柄インデックス
    let artCompletedCount = 0; // クリアした数

    let quizState = {
      targetX: 0,
      targetY: 0,
      userClickedX: null,
      userClickedY: null,
      isAnswered: false,
      currentArt: null,
      artStep: 0,
      artHistory: []
    };

    // 配列をシャッフルする関数
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // 点つなぎキューの初期化（全絵柄をシャッフルしてセット）
    function resetArtQueue() {
      let indices = masterArtData.map((_, i) => i);
      artQueue = shuffle(indices);
      artCompletedCount = 0;
    }

    // 初期化
    modeSelect.addEventListener('change', () => {
      if (modeSelect.value === 'art') {
        resetArtQueue();
      }
      initQuiz();
    });

    btnNext.addEventListener('click', () => {
      // コンプリート後に次へボタンを押したら最初からリセット
      if (modeSelect.value === 'art' && artQueue.length === 0) {
        resetArtQueue();
      }
      initQuiz();
    });

    btnSubmit.addEventListener('click', checkTypeAnswer);
    inputX.addEventListener('keypress', (e) => { if(e.key==='Enter') checkTypeAnswer(); });
    inputY.addEventListener('keypress', (e) => { if(e.key==='Enter') checkTypeAnswer(); });

    function getRandomCoord() {
      let x = Math.floor(Math.random() * (gridRange * 2 + 1)) - gridRange;
      let y = Math.floor(Math.random() * (gridRange * 2 + 1)) - gridRange;
      return { x, y };
    }

    function initQuiz() {
      const mode = modeSelect.value;
      quizState.isAnswered = false;
      quizState.userClickedX = null;
      quizState.userClickedY = null;
      resultMsg.style.display = 'none';
      btnNext.style.display = 'none';

      if (mode === 'click') {
        typeInputs.style.display = 'none';
        btnSubmit.style.display = 'none';
        artProgress.style.display = 'none';

        const c = getRandomCoord();
        quizState.targetX = c.x;
        quizState.targetY = c.y;

        quizQText.innerHTML = `📍 <span class="coord-target">(${c.x}, ${c.y})</span> はどこですか？<br><small style="font-size:0.85rem; font-weight:normal; color:#555;">グラフ上をクリックしてください</small>`;
      } else if (mode === 'type') {
        typeInputs.style.display = 'flex';
        btnSubmit.style.display = 'block';
        artProgress.style.display = 'none';
        inputX.value = '';
        inputY.value = '';
        inputX.focus();

        const c = getRandomCoord();
        quizState.targetX = c.x;
        quizState.targetY = c.y;

        quizQText.innerHTML = `赤い点の <span class="coord-target">xy座標</span> を答えてね！`;
      } else if (mode === 'art') {
        typeInputs.style.display = 'none';
        btnSubmit.style.display = 'none';
        artProgress.style.display = 'block';

        if (artQueue.length === 0) {
          resetArtQueue();
        }

        // 新しい絵柄の開始
        if (!quizState.currentArt) {
          const artIndex = artQueue[0];
          quizState.currentArt = masterArtData[artIndex];
          quizState.artStep = 0;
          quizState.artHistory = [];
        }

        const currentArt = quizState.currentArt;
        const target = currentArt.points[quizState.artStep];
        quizState.targetX = target.x;
        quizState.targetY = target.y;

        stageBadge.textContent = `絵柄 ${artCompletedCount + 1} / ${masterArtData.length}`;
        quizQText.innerHTML = `点つなぎ (${quizState.artStep + 1}番目)<br><span class="coord-target">(${target.x}, ${target.y})</span> をクリック！`;
        
        artStepText.textContent = `${quizState.artStep}/${currentArt.points.length}`;
        progressFill.style.width = `${(quizState.artStep / currentArt.points.length) * 100}%`;
      }

      draw();
    }

    // ❶ モード / ❸ モードのクリック処理
    canvas.addEventListener('click', (e) => {
      const mode = modeSelect.value;
      if (mode === 'type' || quizState.isAnswered) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      const gridX = Math.round((clickX - originX) / scale);
      const gridY = Math.round(-(clickY - originY) / scale);

      if (Math.abs(gridX) > gridRange || Math.abs(gridY) > gridRange) return;

      quizState.userClickedX = gridX;
      quizState.userClickedY = gridY;

      if (mode === 'click') {
        quizState.isAnswered = true;
        resultMsg.style.display = 'block';

        if (gridX === quizState.targetX && gridY === quizState.targetY) {
          resultMsg.className = 'result-msg result-correct';
          resultMsg.innerHTML = '🎉 正解！ばっちりです！';
        } else {
          resultMsg.className = 'result-msg result-wrong';
          resultMsg.innerHTML = `❌ 惜しい！<br>クリックした場所は <strong>(${gridX}, ${gridY})</strong> です。`;
        }
        btnNext.style.display = 'block';
      } else if (mode === 'art') {
        const currentArt = quizState.currentArt;

        if (gridX === quizState.targetX && gridY === quizState.targetY) {
          quizState.artHistory.push({ x: gridX, y: gridY });
          quizState.artStep++;

          if (quizState.artStep >= currentArt.points.length) {
            // 1つの絵柄を完成！
            artCompletedCount++;
            artQueue.shift(); // クリアした絵柄を取り除く
            quizState.currentArt = null;

            resultMsg.style.display = 'block';

            if (artQueue.length === 0) {
              // 全絵柄コンプリート！！
              quizState.isAnswered = true;
              resultMsg.className = 'result-msg result-complete';
              resultMsg.innerHTML = `🏆 <b>全クリアおめでとう！</b><br>すべての点つなぎ絵柄をコンプリートしました！素晴らしい！`;
              btnNext.textContent = '🔄 最初からもう一度あそぶ';
            } else {
              // 次の絵柄へ
              quizState.isAnswered = true;
              resultMsg.className = 'result-msg result-correct';
              resultMsg.innerHTML = `🎨 「<strong>${currentArt.name}</strong>」が完成！<br>すごい！この調子で次へ進もう！`;
              btnNext.textContent = '次の問題へ ➔';
            }

            btnNext.style.display = 'block';
            artStepText.textContent = `${currentArt.points.length}/${currentArt.points.length}`;
            progressFill.style.width = `100%`;
          } else {
            // 同じ絵柄の次の点へ
            const nextTarget = currentArt.points[quizState.artStep];
            quizState.targetX = nextTarget.x;
            quizState.targetY = nextTarget.y;
            quizQText.innerHTML = `点つなぎ (${quizState.artStep + 1}番目)<br><span class="coord-target">(${nextTarget.x}, ${nextTarget.y})</span> をクリック！`;
            artStepText.textContent = `${quizState.artStep}/${currentArt.points.length}`;
            progressFill.style.width = `${(quizState.artStep / currentArt.points.length) * 100}%`;
          }
        } else {
          resultMsg.style.display = 'block';
          resultMsg.className = 'result-msg result-wrong';
          resultMsg.innerHTML = `❌ そこは <strong>(${gridX}, ${gridY})</strong> です。<br>もう一度 <strong>(${quizState.targetX}, ${quizState.targetY})</strong> を探そう！`;
        }
      }

      draw();
    });

    // ❷ モードの判定処理
    function checkTypeAnswer() {
      if (quizState.isAnswered) return;

      const ansX = parseInt(inputX.value);
      const ansY = parseInt(inputY.value);

      if (isNaN(ansX) || isNaN(ansY)) {
        alert('x座標とy座標の両方に数値を入力してください！');
        return;
      }

      quizState.isAnswered = true;
      resultMsg.style.display = 'block';

      if (ansX === quizState.targetX && ansY === quizState.targetY) {
        resultMsg.className = 'result-msg result-correct';
        resultMsg.innerHTML = '🎉 正解！大正解です！';
      } else {
        resultMsg.className = 'result-msg result-wrong';
        resultMsg.innerHTML = `❌ 残念...<br>正解は <strong>(${quizState.targetX}, ${quizState.targetY})</strong> でした。`;
      }
      btnNext.style.display = 'block';
      draw();
    }

    // 描画メインルーチン
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      const mode = modeSelect.value;

      if (mode === 'type') {
        drawPoint(quizState.targetX, quizState.targetY, '#e74c3c', 7);
        if (quizState.isAnswered) {
          drawPointLabel(quizState.targetX, quizState.targetY, `(${quizState.targetX}, ${quizState.targetY})`, '#e74c3c');
        }
      } else if (mode === 'click') {
        if (quizState.isAnswered) {
          drawPoint(quizState.targetX, quizState.targetY, '#2ecc71', 8);
          drawPointLabel(quizState.targetX, quizState.targetY, `正解 (${quizState.targetX}, ${quizState.targetY})`, '#2ecc71');

          if (quizState.userClickedX !== quizState.targetX || quizState.userClickedY !== quizState.targetY) {
            drawPoint(quizState.userClickedX, quizState.userClickedY, '#e74c3c', 7);
            drawPointLabel(quizState.userClickedX, quizState.userClickedY, `(${quizState.userClickedX}, ${quizState.userClickedY})`, '#e74c3c');
          }
        }
      } else if (mode === 'art') {
        if (quizState.artHistory.length > 0) {
          ctx.beginPath();
          ctx.strokeStyle = '#e67e22';
          ctx.lineWidth = 3.5;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';

          quizState.artHistory.forEach((p, idx) => {
            const px = originX + p.x * scale;
            const py = originY - p.y * scale;
            if (idx === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.stroke();

          quizState.artHistory.forEach((p) => {
            drawPoint(p.x, p.y, '#e67e22', 5);
          });
        }
      }
    }

    // 方眼紙・軸の描画
    function drawGrid() {
      ctx.strokeStyle = '#e8eeea';
      ctx.lineWidth = 1;

      for (let i = -gridRange; i <= gridRange; i++) {
        let x = originX + i * scale;
        ctx.beginPath();
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();

        let y = originY - i * scale;
        ctx.beginPath();
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); ctx.stroke();

      ctx.fillStyle = '#7f8c8d';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      for (let i = -gridRange; i <= gridRange; i++) {
        if (i === 0) continue;
        ctx.fillText(i, originX + i * scale, originY + 4);
        ctx.textAlign = 'right';
        ctx.fillText(i, originX - 4, originY - i * scale - 5);
        ctx.textAlign = 'center';
      }
      ctx.textAlign = 'right';
      ctx.fillText('O', originX - 4, originY + 4);
      ctx.font = 'bold 13px sans-serif';
      ctx.fillStyle = '#2c3e50';
      ctx.fillText('x', canvas.width - 10, originY + 4);
      ctx.fillText('y', originX - 10, 5);
    }

    function drawPoint(x, y, color, radius) {
      const px = originX + x * scale;
      const py = originY - y * scale;

      ctx.beginPath();
      ctx.arc(px, py, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawPointLabel(x, y, text, color) {
      const px = originX + x * scale;
      const py = originY - y * scale;

      ctx.font = 'bold 12px sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.fillText(text, px + 8, py - 8);
    }

    // 初回起動（キューを初期化）
    resetArtQueue();
    initQuiz();
  </script>
</body>
</html>
