<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ナンバー・ドロップ：数の分解パズル</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            color: #fff;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        /* メニュー画面 */
        #menu-panel {
            background: rgba(44, 62, 80, 0.95);
            padding: 25px 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            margin-top: 10vh;
            max-width: 450px;
            width: 90%;
            border: 2px solid #34495e;
        }

        .menu-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ecf0f1;
            margin-bottom: 15px;
        }

        .menu-guide {
            text-align: left;
            font-size: 0.9rem;
            color: #bdc3c7;
            background: #34495e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* スコア・状況表示 */
        #info-panel {
            background: rgba(44, 62, 80, 0.9);
            padding: 10px 30px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            text-align: center;
            pointer-events: auto;
            display: none;
            border: 1px solid #34495e;
        }

        #score-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f1c40f;
        }
        
        #mode-display {
            font-size: 0.9rem;
            color: #bdc3c7;
            margin-bottom: 2px;
        }

        #danger-warning {
            color: #ff4757;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 5px;
            display: none;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        #game-over-panel {
            display: none;
            background: rgba(192, 41, 43, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            margin-top: 20vh;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #e67e22, #d35400);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        button.btn-blue {
            background: linear-gradient(135deg, #2980b9, #3498db);
        }

        /* ゲームメイン画面 */
        #game-stage {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(500px, calc(100vw - 40px));
            max-width: 500px;
            height: 100vh;
            background-color: #2c3e50;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 1;
            overflow: hidden;
        }

        /* デッドライン（警告線） */
        #dead-line {
            position: absolute;
            top: 150px;
            left: 0;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #e74c3c, #e74c3c 10px, transparent 10px, transparent 20px);
            z-index: 2;
        }

        #dead-line-text {
            position: absolute;
            top: 125px;
            right: 10px;
            font-size: 0.8rem;
            color: #e74c3c;
            font-weight: bold;
            z-index: 2;
        }

        /* 数字の球 */
        .ball {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            will-change: left, top;
        }

        /* 消滅時のエフェクト用 */
        .pop-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(241, 196, 15, 0.6);
            animation: ballPop 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes ballPop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* スマホレスポンシブ対応 (幅540px以下) */
        @media (max-width: 540px) {
            #ui-layer {
                padding: 10px;
            }

            #menu-panel {
                max-width: 90%;
                width: 90%;
                padding: 15px 20px;
                margin-top: 8vh;
            }

            .menu-title {
                font-size: 1.5rem;
                margin-bottom: 10px;
            }

            .menu-guide {
                font-size: 0.8rem;
                padding: 8px;
                margin-bottom: 15px;
                line-height: 1.3;
            }

            .mode-select {
                gap: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }

            #game-stage {
                width: calc(100vw - 20px);
                max-width: 100%;
            }

            #info-panel {
                padding: 8px 20px;
            }

            #score-text {
                font-size: 1.4rem;
            }

            #mode-display {
                font-size: 0.8rem;
            }

            #danger-warning {
                font-size: 1rem;
            }

            #game-over-panel {
                padding: 20px;
                margin-top: 15vh;
            }

            #dead-line-text {
                font-size: 0.7rem;
                top: 130px;
                right: 5px;
            }
        }

        /* タブレット対応 (541px - 1024px) */
        @media (min-width: 541px) and (max-width: 1024px) {
            #game-stage {
                width: min(450px, calc(100vw - 40px));
                max-width: 450px;
            }
        }

        /* デスクトップ対応 (1025px以上) */
        @media (min-width: 1025px) {
            #game-stage {
                width: 500px;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="menu-panel">
            <div class="menu-title">ナンバー・ドロップ</div>
            <div class="menu-guide">
                <strong>【ルール・操作方法】</strong><br>
                上から数字の球が落ちてきます。<br><br>
                ・<strong>シングルクリック</strong>：因数分解（掛け算の分解）<br>
                ・<strong>ダブルクリック</strong>：足し算分解<br>
                 （偶数は 3 + 1の差の2数 に3分裂）<br>
                 （奇数は 1の差の2数 に2分裂）<br>
                ・<strong>同じ数字</strong>がぶつかり合うと消滅！<br>
                ・<strong>素数の消滅時</strong>、周囲の数の因数を削り取る！<br><br>
                赤い点線を超えて2.5秒経つとゲームオーバー。
            </div>
            <div class="mode-select">
                <button onclick="startGame('normal')">通常モード (次第に加速)</button>
                <button class="btn-blue" onclick="startGame('grow')">ドンドンふえるモード (50〜)</button>
            </div>
        </div>

        <div id="info-panel">
            <div id="mode-display">MODE: NORMAL</div>
            <div id="score-text">SCORE: 0</div>
            <div id="danger-warning">⚠️ DANGER ⚠️</div>
            <button style="padding:5px 15px; font-size:0.9rem; margin-top:5px; background:#7f8c8d;" onclick="backToMenu()">タイトルへ</button>
        </div>

        <div id="game-over-panel">
            <div class="menu-title" style="color:#fff;">GAME OVER</div>
            <div id="final-score" style="font-size:1.5rem; margin-bottom:20px;"></div>
            <button id="restart-btn" onclick="startGame('normal')" style="background:#fff; color:#c0392b;">もう一度挑戦</button>
        </div>
    </div>

    <div id="game-stage">
        <div id="dead-line"></div>
        <div id="dead-line-text">DANGER LINE</div>
    </div>

    <script>
        const stage = document.getElementById('game-stage');
        const menuPanel = document.getElementById('menu-panel');
        const infoPanel = document.getElementById('info-panel');
        const gameOverPanel = document.getElementById('game-over-panel');
        const scoreText = document.getElementById('score-text');
        const modeDisplay = document.getElementById('mode-display');
        const finalScoreText = document.getElementById('final-score');
        const dangerWarning = document.getElementById('danger-warning');
        const restartBtn = document.getElementById('restart-btn');

        let balls = [];
        let gameActive = false;
        let score = 0;
        let animationId = null;
        let spawnTimer = null;
        let dangerStartTime = null;
        
        // モード管理用の変数
        let gameMode = 'normal'; // 'normal' または 'grow'
        let currentGrowNum = 50;  // ドンドんふえるモード用の現在の数字カウント
        let spawnCount = 0;      // 通常モードの加速計算用の生成数カウント

        // 動的にステージ幅を取得
        let STAGE_WIDTH = 500;
        const DEAD_LINE_Y = 150;

        // ステージ幅を取得する関数
        function updateStageWidth() {
            STAGE_WIDTH = stage.getBoundingClientRect().width;
        }

        // ウィンドウリサイズ時にステージ幅を更新
        window.addEventListener('resize', updateStageWidth);

        // 初期化時にステージ幅を設定
        updateStageWidth();

        // 素数判定
        function isPrime(num) {
            if (num <= 1) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        // 因数分解ペア（掛け算）
        function getFactorPair(num) {
            let factors = [];
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) factors.push(i);
            }
            if (factors.length === 0) return null;
            const f = factors[Math.floor(Math.random() * factors.length)];
            return [f, num / f];
        }

        // 足し算分解（ダブルクリック用）
        function getSumSplitValues(num) {
            if (num <= 1) return null;
            
            if (num % 2 === 0) {
                if (num <= 4) {
                    const f1 = Math.floor(num / 2);
                    return [f1, num - f1];
                }
                const remain = num - 3;
                const f1 = Math.floor(remain / 2);
                const f2 = remain - f1;
                return [3, f1, f2];
            } else {
                const f1 = Math.floor(num / 2);
                const f2 = num - f1;
                return [f1, f2];
            }
        }

        // 数字に応じた色
        function getBallColor(num) {
            if (isPrime(num)) return 'linear-gradient(135deg, #e74c3c, #c0392b)'; 
            const hue = (num * 57) % 360;
            return `linear-gradient(135deg, hsl(${hue}, 75%, 55%), hsl(${(hue+40)%360}, 75%, 40%))`;
        }

        // 数字に応じたサイズ（数字が大きくなるほど最大130pxまでスムーズに巨大化）
        function calculateSize(num) {
            const minSize = 45;
            const maxSize = 130; 
            const size = minSize + (Math.log(Math.max(1, num)) / Math.log(500)) * (maxSize - minSize);
            return Math.max(minSize, Math.min(maxSize, size));
        }

        function updateBallAppearance(ball) {
            const size = calculateSize(ball.num);
            ball.size = size;
            ball.radius = size / 2;
            ball.element.style.width = `${size}px`;
            ball.element.style.height = `${size}px`;
            ball.element.innerText = ball.num;
            ball.element.style.background = getBallColor(ball.num);
            ball.element.style.fontSize = `${Math.max(14, size / 2.5)}px`;
        }

        function startGame(mode) {
            gameMode = mode;
            menuPanel.style.display = 'none';
            gameOverPanel.style.display = 'none';
            infoPanel.style.display = 'block';
            dangerWarning.style.display = 'none';
            
            if (gameMode === 'grow') {
                modeDisplay.innerText = "MODE: ドンドンふえる";
                currentGrowNum = 50;
                restartBtn.setAttribute("onclick", "startGame('grow')");
                restartBtn.className = "btn-blue";
            } else {
                modeDisplay.innerText = "MODE: NORMAL";
                spawnCount = 0;
                restartBtn.setAttribute("onclick", "startGame('normal')");
                restartBtn.className = "";
            }
            
            if (animationId) cancelAnimationFrame(animationId);
            clearInterval(spawnTimer);
            document.querySelectorAll('.ball').forEach(el => el.remove());
            
            balls = [];
            score = 0;
            dangerStartTime = null;
            scoreText.innerText = `SCORE: ${score}`;
            gameActive = true;

            spawnBall();
            spawnTimer = setInterval(spawnBall, 3500);

            animate();
        }

        function backToMenu() {
            gameActive = false;
            clearInterval(spawnTimer);
            if (animationId) cancelAnimationFrame(animationId);
            document.querySelectorAll('.ball').forEach(el => el.remove());
            balls = [];
            infoPanel.style.display = 'none';
            gameOverPanel.style.display = 'none';
            menuPanel.style.display = 'flex';
        }

        function spawnBall() {
            if (!gameActive) return;
            
            let num = 0;
            let baseVy = 1.5; // 初期落下速度
            
            if (gameMode === 'grow') {
                // ドンドンふえるモード：50からスタートして毎回1ずつ加算
                num = currentGrowNum;
                currentGrowNum++;
            } else {
                // 通常モード：10〜500のランダム
                num = Math.floor(Math.random() * 491) + 10;
                
                // 【加速仕様】生成数が5個増えるたびに初期落下速度が0.3ずつアップ(最大値5.0)
                spawnCount++;
                baseVy = 1.5 + Math.floor(spawnCount / 5) * 0.3;
                if (baseVy > 5.0) baseVy = 5.0;
            }

            const size = calculateSize(num);
            const x = Math.random() * (STAGE_WIDTH - size);
            createBallElement(num, x, -size, baseVy);
        }

        function createBallElement(num, x, y, baseVy = 1.5) {
            const size = calculateSize(num);
            const radius = size / 2;

            const el = document.createElement('div');
            el.className = 'ball';
            el.innerText = num;
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            el.style.fontSize = `${Math.max(14, size / 2.5)}px`;
            el.style.background = getBallColor(num);

            stage.appendChild(el);

            const ballObj = {
                num: num,
                element: el,
                size: size,
                radius: radius,
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: baseVy,
                clickTimeout: null
            };

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!gameActive) return;

                if (ballObj.clickTimeout) {
                    clearTimeout(ballObj.clickTimeout);
                    ballObj.clickTimeout = null;
                    splitBall(ballObj, 'sum');
                } else {
                    ballObj.clickTimeout = setTimeout(() => {
                        ballObj.clickTimeout = null;
                        splitBall(ballObj, 'factor');
                    }, 250);
                }
            });

            balls.push(ballObj);
        }

        function splitBall(ball, type) {
            let splitValues = null;
            if (type === 'factor') {
                splitValues = getFactorPair(ball.num);
                if (!splitValues) {
                    ball.vy = -4; 
                    return;
                }
            } else {
                splitValues = getSumSplitValues(ball.num);
                if (!splitValues) return;
            }

            const centerX = ball.x + ball.radius;
            const centerY = ball.y + ball.radius;

            if (ball.element.parentNode) stage.removeChild(ball.element);
            balls = balls.filter(b => b !== ball);

            const count = splitValues.length;
            splitValues.forEach((val, index) => {
                const offset = (index - (count - 1) / 2) * (ball.radius * 0.8);
                createBallElement(val, centerX - ball.radius + offset, centerY - ball.radius);
                
                const newBall = balls[balls.length - 1];
                newBall.vx = (index - (count - 1) / 2) * 3;
                newBall.vy = -2.5;
            });

            score += 5;
            scoreText.innerText = `SCORE: ${score}`;
        }

        function triggerPopEffect(x, y, size) {
            const effect = document.createElement('div');
            effect.className = 'pop-effect';
            effect.style.width = `${size}px`;
            effect.style.height = `${size}px`;
            effect.style.left = `${x}px`;
            effect.style.top = `${y}px`;
            stage.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }

        function animate() {
            if (!gameActive) return;

            const height = window.innerHeight;
            let isViolatingDeadline = false;

            // 1. 移動と壁・床との衝突
            balls.forEach(b => {
                b.x += b.vx;
                b.y += b.vy;
                b.vy += 0.05;

                if (b.x < 0) { b.x = 0; b.vx *= -0.6; }
                else if (b.x + b.size > STAGE_WIDTH) { b.x = STAGE_WIDTH - b.size; b.vx *= -0.6; }

                if (b.y + b.size > height) {
                    b.y = height - b.size;
                    b.vy *= -0.3;
                    b.vx *= 0.8;
                }

                // ボール中心がデッドラインを超えているかで判定
                const ballCenterY = b.y + b.radius;
                if (ballCenterY < DEAD_LINE_Y) {
                    isViolatingDeadline = true;
                }

                b.element.style.left = `${b.x}px`;
                b.element.style.top = `${b.y}px`;
            });

            // 2. 球同士の衝突物理 ＆ 消滅・因数連鎖処理
            let loopRestart = false;
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];

                    const c1x = b1.x + b1.radius;
                    const c1y = b1.y + b1.radius;
                    const c2x = b2.x + b2.radius;
                    const c2y = b2.y + b2.radius;

                    const dx = c2x - c1x;
                    const dy = c2y - c1y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = b1.radius + b2.radius;

                    if (distance < minDistance) {
                        if (b1.num === b2.num) {
                            const targetNum = b1.num;
                            const isPrimeMatch = isPrime(targetNum);

                            triggerPopEffect(c1x, c1y, b1.size);
                            triggerPopEffect(c2x, c2y, b2.size);
                            
                            let removeTargets = [b1, b2];
                            let addedScore = targetNum * 2;

                            if (isPrimeMatch) {
                                const chainRadius = b1.radius * 5; 
                                
                                balls.forEach(b => {
                                    if (b !== b1 && b !== b2) {
                                        const bcx = b.x + b.radius;
                                        const bcy = b.y + b.radius;
                                        
                                        const distToB1 = Math.sqrt((bcx - c1x) ** 2 + (bcy - c1y) ** 2);
                                        const distToB2 = Math.sqrt((bcx - c2x) ** 2 + (bcy - c2y) ** 2);
                                        
                                        if (distToB1 <= chainRadius || distToB2 <= chainRadius) {
                                            if (b.num % targetNum === 0) {
                                                const nextValue = b.num / targetNum;
                                                
                                                if (nextValue === 1) {
                                                    triggerPopEffect(bcx, bcy, b.size);
                                                    removeTargets.push(b);
                                                    addedScore += b.num * 2;
                                                } else {
                                                    b.num = nextValue;
                                                    updateBallAppearance(b);
                                                    addedScore += targetNum; 
                                                }
                                            }
                                        }
                                    }
                                });
                            }

                            removeTargets.forEach(b => {
                                if (b.element.parentNode) stage.removeChild(b.element);
                            });

                            balls = balls.filter(b => !removeTargets.includes(b));
                            
                            score += addedScore;
                            scoreText.innerText = `SCORE: ${score}`;
                            
                            loopRestart = true;
                            break;
                        }

                        const overlap = minDistance - distance;
                        const nx = dx / (distance || 1);
                        const ny = dy / (distance || 1);

                        b1.x -= nx * overlap * 0.5;
                        b1.y -= ny * overlap * 0.5;
                        b2.x += nx * overlap * 0.5;
                        b2.y += ny * overlap * 0.5;

                        const kx = b1.vx - b2.vx;
                        const ky = b1.vy - b2.vy;
                        const p = 2 * (nx * kx + ny * ky) / 2;

                        b1.vx -= p * nx * 0.8;
                        b1.vy -= p * ny * 0.8;
                        b2.vx += p * nx * 0.8;
                        b2.vy += p * ny * 0.8;
                    }
                }
                if (loopRestart) break;
            }

            // 3. ゲームオーバー判定（2.5秒）
            if (isViolatingDeadline) {
                if (dangerStartTime === null) {
                    dangerStartTime = Date.now();
                    dangerWarning.style.display = 'block';
                } else {
                    const elapsed = Date.now() - dangerStartTime;
                    if (elapsed >= 2500) {
                        endGame();
                        return;
                    }
                }
            } else {
                dangerStartTime = null;
                dangerWarning.style.display = 'none';
            }

            animationId = requestAnimationFrame(animate);
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnTimer);
            if (animationId) cancelAnimationFrame(animationId);
            
            dangerWarning.style.display = 'none';
            infoPanel.style.display = 'none';
            gameOverPanel.style.display = 'block';
            finalScoreText.innerText = `最終スコア: ${score} 点`;
        }
    </script>
</body>
</html>
