<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>減法混色学習シミュレータ</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin:20px;
}

h1{
    margin-bottom:10px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.sliderBox{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

svg{
    background:white;
    border:1px solid #ccc;
    border-radius:10px;
}

.infoRow{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-top:20px;
    flex-wrap:wrap;
}

.panel{
    background:white;
    padding:15px;
    border-radius:10px;
    min-width:220px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.colorBox{
    width:120px;
    height:120px;
    border:2px solid black;
    margin:auto;
    margin-bottom:10px;
}

.value{
    font-size:18px;
    line-height:1.8;
}

</style>
</head>

<body>

<h1>減法混色シミュレータ</h1>

<p>
白色光(R+G+B)が色材に当たり、<br>
色材が光を吸収し、残った光が目に届きます。
</p>

<div class="controls">

<div class="sliderBox">
R吸収率<br>
<input type="range" id="rAbs" min="0" max="100" value="100">
<br>
<span id="rVal">100</span>%
</div>

<div class="sliderBox">
G吸収率<br>
<input type="range" id="gAbs" min="0" max="100" value="0">
<br>
<span id="gVal">0</span>%
</div>

<div class="sliderBox">
B吸収率<br>
<input type="range" id="bAbs" min="0" max="100" value="0">
<br>
<span id="bVal">0</span>%
</div>

</div>

<svg width="1000" height="420">

<!-- 光源 -->

<text x="50" y="60" font-size="24">
白色光源
</text>

<!-- 入射光 -->

<line x1="120" y1="100" x2="400" y2="100"
stroke="red" stroke-width="12"/>

<line x1="120" y1="170" x2="400" y2="170"
stroke="lime" stroke-width="12"/>

<line x1="120" y1="240" x2="400" y2="240"
stroke="blue" stroke-width="12"/>

<text x="90" y="105">R</text>
<text x="90" y="175">G</text>
<text x="90" y="245">B</text>

<!-- 色材 -->

<rect
x="400"
y="60"
width="180"
height="230"
fill="#dddddd"
stroke="black"
stroke-width="2"
/>

<text x="460" y="140" font-size="28">
色材
</text>

<text id="materialInfo"
x="490"
y="190"
text-anchor="middle"
font-size="16">
</text>

<!-- 反射光 -->

<line
id="rOut"
x1="580"
y1="100"
x2="850"
y2="100"
stroke="red"
stroke-width="12"
/>

<line
id="gOut"
x1="580"
y1="170"
x2="850"
y2="170"
stroke="lime"
stroke-width="12"
/>

<line
id="bOut"
x1="580"
y1="240"
x2="850"
y2="240"
stroke="blue"
stroke-width="12"
/>

<!-- 目 -->

<text x="890" y="190" font-size="80">
👁
</text>

</svg>

<div class="infoRow">

<div class="panel">

<h2>色材が吸収した光</h2>

<div id="absorbColor" class="colorBox"></div>

<div id="absorbText" class="value"></div>

</div>

<div class="panel">

<h2>目に届く光（見える色）</h2>

<div id="resultColor" class="colorBox"></div>

<div id="resultText" class="value"></div>

</div>

</div>

<script>

const rAbs=document.getElementById("rAbs");
const gAbs=document.getElementById("gAbs");
const bAbs=document.getElementById("bAbs");

[rAbs,gAbs,bAbs].forEach(
x=>x.addEventListener("input",update)
);

function colorName(r,g,b){

if(r<20 && g>235 && b>235)
return "シアン";

if(r>235 && g<20 && b>235)
return "マゼンタ";

if(r>235 && g>235 && b<20)
return "イエロー";

if(r>235 && g<20 && b<20)
return "赤";

if(r<20 && g>235 && b<20)
return "緑";

if(r<20 && g<20 && b>235)
return "青";

if(r>235 && g>235 && b>235)
return "白";

if(r<20 && g<20 && b<20)
return "黒";

return "混合色";

}

function update(){

let ra=Number(rAbs.value);
let ga=Number(gAbs.value);
let ba=Number(bAbs.value);

rVal.textContent=ra;
gVal.textContent=ga;
bVal.textContent=ba;

let R=Math.round(255*(100-ra)/100);
let G=Math.round(255*(100-ga)/100);
let B=Math.round(255*(100-ba)/100);

let absorbR=255-R;
let absorbG=255-G;
let absorbB=255-B;

rOut.style.opacity=(100-ra)/100;
gOut.style.opacity=(100-ga)/100;
bOut.style.opacity=(100-ba)/100;

resultColor.style.background=
`rgb(${R},${G},${B})`;

absorbColor.style.background=
`rgb(${absorbR},${absorbG},${absorbB})`;

resultText.innerHTML=
`
<b>${colorName(R,G,B)}</b><br>
R = ${R}<br>
G = ${G}<br>
B = ${B}
`;

absorbText.innerHTML=
`
R = ${absorbR}<br>
G = ${absorbG}<br>
B = ${absorbB}
`;

materialInfo.innerHTML=
`
吸収<br>
R:${absorbR}<br>
G:${absorbG}<br>
B:${absorbB}
`;

}

update();

</script>

</body>
</html>
