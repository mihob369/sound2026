<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アプリリンク集</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f7f8fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      border-bottom: 1px solid #e8eaed;
      padding: 28px 40px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #1a1a2e;
    }
    header p {
      font-size: 0.8rem;
      color: #8a8fa8;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* ── Container ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Category ── */
    .category {
      margin-bottom: 56px;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .category-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #5b6b9e;
      text-transform: uppercase;
    }
    .category-line {
      flex: 1;
      height: 1px;
      background: #e4e7f0;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #ffffff;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.88rem;
      font-weight: 500;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    }
    .card a:hover {
      border-color: #b0badc;
      box-shadow: 0 4px 16px rgba(91, 107, 158, 0.12);
      transform: translateY(-2px);
    }
    .card a:active {
      transform: translateY(0);
    }
    .arrow {
      font-size: 0.75rem;
      color: #a0aabe;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: #a0aabe;
      letter-spacing: 0.04em;
      border-top: 1px solid #e8eaed;
    }
  </style>
</head>
<body>

<header>
  <h1>アプリリンク集</h1>
  <p>よく使うアプリへのリンクをまとめています</p>
</header>

<div class="container">

  <!-- 授業用アプリ -->
  <div class="category">
    <div class="category-header">
      <span class="category-label">授業用アプリ</span>
      <div class="category-line"></div>
    </div>
    <div class="grid">
      <div class="card"><a href="https://mihob369.github.io/sound2026/sekigae.html" target="_blank">席替え <span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/shimei-app.html" target="_blank">指名アプリ <span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/mondai.html" target="_blank">三択アプリ <span class="arrow">↗</span></a></div>
    </div>
  </div>

  <!-- 情報科 -->
  <div class="category">
    <div class="category-header">
      <span class="category-label">情報科</span>
      <div class="category-line"></div>
    </div>
    <div class="grid">
      <div class="card"><a href="https://mihob369.github.io/sound2026/sound.html" target="_blank">音のデジタル化<span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/2shinsu.html" target="_blank">2進数学習 <span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/digital-kansan.html" target="_blank">デジタル量計算 <span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/moji-code.html" target="_blank">文字コード <span class="arrow">↗</span></a></div>
      <div class="card"><a href="https://mihob369.github.io/sound2026/data-compression.html" target="_blank">データ圧縮 <span class="arrow">↗</span></a></div>
       <div class="card"><a href="https://mihob369.github.io/sound2026/oto-gazo-doga.html" target="_blank">音・画像・動画 <span class="arrow">↗</span></a></div>
    </div>
  </div>

  <!-- 数学 -->
  <div class="category">
    <div class="category-header">
      <span class="category-label">数学</span>
      <div class="category-line"></div>
    </div>
    <div class="grid">
       <div class="card"><a href="https://mihob369.github.io/sound2026/sosu.html" target="_blank">素数分解ゲーム <span class="arrow">↗</span></a></div>
    </div>
  </div>

  <!-- その他 -->
  <div class="category">
    <div class="category-header">
      <span class="category-label">その他</span>
      <div class="category-line"></div>
    </div>
    <div class="grid">
       <div class="card"><a href="https://docs.google.com/spreadsheets/d/1CTpPXWgQKivHTVyQI5aTjY7H2ZcJk5158oD8ACo6J6A/edit?usp=sharing" target="_blank">三択入力シート <span class="arrow">↗</span></a></div>
    </div>
  </div>

</div>

<footer>© 2026 My Apps</footer>

</body>
</html>
