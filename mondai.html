<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スプレッドシートクイズ（修正版）</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
button { margin: 5px; padding: 10px 20px; font-size: 16px; }
.card { margin: 20px; font-size: 20px; }
select { padding: 10px; margin: 5px; }
</style>
</head>
<body>

<h1>3択クイズ（複数問題セット対応）</h1>

<p>問題セット選択：</p>
<select id="sheetSelector"></select>
<br>
<button onclick="loadSheet()">読み込み</button>
<button onclick="startQuiz()">クイズ開始（10問）</button>

<div id="quizArea" style="display:none;">
    <div id="question" class="card"></div>
    <div id="choices"></div>
</div>

<div id="result" style="font-size:24px; margin-top:20px;"></div>

<script>
// 固定スプレッドシートID
const SHEET_ID = "1CTpPXWgQKivHTVyQI5aTjY7H2ZcJk5158oD8ACo6J6A";

// シート一覧（gidは各シートURLから取得）
const SHEETS = [
  { name: "問題A", gid: "0" },
  { name: "問題B", gid: "880344344" },
  { name: "問題C", gid: "829673232" },
  { name: "問題D", gid: "1562289067" },
  { name: "問題E", gid: "2036610256" }
];

let quizData = [];
let current = 0;
let score = 0;
let totalQuestions = 10;

// セレクト初期化
const selector = document.getElementById("sheetSelector");
SHEETS.forEach(sheet => {
    const option = document.createElement("option");
    option.value = sheet.gid;
    option.textContent = sheet.name;
    selector.appendChild(option);
});

// 読み込み処理
function loadSheet() {
    const gid = document.getElementById("sheetSelector").value;
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;

    console.log("読み込みURL:", url);

    fetch(url)
        .then(res => res.text())
        .then(text => {
            const rows = text.split("\n").slice(1);

            quizData = rows.map(row => {
                const cols = row.split(",");
                return {
                    q: cols[0],
                    A: cols[1],
                    B: cols[2],
                    C: cols[3],
                    answer: cols[4] ? cols[4].trim() : ""
                };
            }).filter(x => x.q);

            alert("読み込み完了: " + quizData.length + "問");
        })
        .catch(err => {
            console.error("エラー:", err);
            alert("読み込み失敗。スプレッドシートの公開設定を確認してください。");
        });
}

// クイズ開始
function startQuiz() {
    if (quizData.length === 0) {
        alert("先に読み込んでください");
        return;
    }

    shuffleArray(quizData);
    current = 0;
    score = 0;

    document.getElementById("result").innerHTML = "";
    document.getElementById("quizArea").style.display = "block";

    nextQuestion();
}

function nextQuestion() {
    if (current >= totalQuestions) {
        showResult();
        return;
    }

    const q = quizData[current];
    document.getElementById("question").innerText = (current + 1) + "問目: " + q.q;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    ["A","B","C"].forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice + ": " + q[choice];
        btn.onclick = () => checkAnswer(choice);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(choice) {
    const correct = quizData[current].answer;
    if (choice === correct) score += 10;
    current++;
    nextQuestion();
}

function showResult() {
    document.getElementById("quizArea").style.display = "none";
    document.getElementById("result").innerHTML = `スコア: ${score} / 100`;
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
</script>

</body>
</html>
