<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ナンバー・ドロップ：数の分解パズル</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a252f;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            color: #fff;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        /* メニュー画面 */
        #menu-panel {
            background: rgba(44, 62, 80, 0.95);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            margin-top: 15vh;
            max-width: 450px;
            width: 90%;
            border: 2px solid #34495e;
        }

        .menu-title {
            font-size: 2rem;
            font-weight: bold;
            color: #ecf0f1;
            margin-bottom: 15px;
        }

        .menu-guide {
            text-align: left;
            font-size: 0.95rem;
            color: #bdc3c7;
            background: #34495e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* スコア・状況表示 */
        #info-panel {
            background: rgba(44, 62, 80, 0.9);
            padding: 10px 30px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            text-align: center;
            pointer-events: auto;
            display: none;
            border: 1px solid #34495e;
        }

        #score-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f1c40f;
        }

        #game-over-panel {
            display: none;
            background: rgba(192, 41, 43, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            pointer-events: auto;
            margin-top: 20vh;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #e67e22, #d35400);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        /* ゲームメイン画面 */
        #game-stage {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 500px; /* 落ちゲーのプレイエリア幅 */
            height: 100vh;
            background-color: #2c3e50;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 1;
            overflow: hidden;
        }

        /* デッドライン（警告線） */
        #dead-line {
            position: absolute;
            top: 150px;
            left: 0;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #e74c3c, #e74c3c 10px, transparent 10px, transparent 20px);
            z-index: 2;
        }

        #dead-line-text {
            position: absolute;
            top: 125px;
            right: 10px;
            font-size: 0.8rem;
            color: #e74c3c;
            font-weight: bold;
            z-index: 2;
        }

        /* 数字の球 */
        .ball {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.4), 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            will-change: left, top;
        }

        /* 消滅時のエフェクト用 */
        .pop-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(241, 196, 15, 0.6);
            animation: ballPop 0.3s ease-out forwards;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes ballPop {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="menu-panel">
            <div class="menu-title">ナンバー・ドロップ</div>
            <div class="menu-guide">
                <strong>【ルール・操作方法】</strong><br>
                上から数字の球が落ちてきます。<br><br>
                ・<strong>シングルクリック</strong>：因数分解（掛け算の分解）<br>
                ・<strong>ダブルクリック</strong>：引き算分解（足し算の分解）<br>
                ・<strong>同じ数字</strong>がぶつかり合うと合体して消滅！<br><br>
                赤い点線まで球が積み上がるとゲームオーバー。
            </div>
            <button onclick="startGame()">ゲームスタート</button>
        </div>

        <div id="info-panel">
            <div id="score-text">SCORE: 0</div>
            <button style="padding:5px 15px; font-size:0.9rem; margin-top:5px; background:#7f8c8d;" onclick="backToMenu()">タイトルへ</button>
        </div>

        <div id="game-over-panel">
            <div class="menu-title" style="color:#fff;">GAME OVER</div>
            <div id="final-score" style="font-size:1.5rem; margin-bottom:20px;"></div>
            <button onclick="startGame()" style="background:#fff; color:#c0392b;">もう一度挑戦</button>
        </div>
    </div>

    <div id="game-stage">
        <div id="dead-line"></div>
        <div id="dead-line-text">DANGER LINE</div>
    </div>

    <script>
        const stage = document.getElementById('game-stage');
        const menuPanel = document.getElementById('menu-panel');
        const infoPanel = document.getElementById('info-panel');
        const gameOverPanel = document.getElementById('game-over-panel');
        const scoreText = document.getElementById('score-text');
        const finalScoreText = document.getElementById('final-score');

        let balls = [];
        let gameActive = false;
        let score = 0;
        let animationId = null;
        let spawnTimer = null;
        
        const STAGE_WIDTH = 500;
        const DEAD_LINE_Y = 150;

        // 素数判定
        function isPrime(num) {
            if (num <= 1) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        // 因数分解ペア（掛け算）
        function getFactorPair(num) {
            let factors = [];
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) factors.push(i);
            }
            if (factors.length === 0) return null;
            const f = factors[Math.floor(Math.random() * factors.length)];
            return [f, num / f];
        }

        // 足し算分解ペア（ダブルクリック用）
        function getSumPair(num) {
            if (num <= 2) return null;
            // 1 から num-1 までの間でランダムに分ける
            const f1 = Math.floor(Math.random() * (num - 2)) + 1;
            return [f1, num - f1];
        }

        // 数字に応じた色
        function getBallColor(num) {
            if (isPrime(num)) return 'linear-gradient(135deg, #e74c3c, #c0392b)'; // 素数は赤
            const hue = (num * 57) % 360;
            return `linear-gradient(135deg, hsl(${hue}, 75%, 55%), hsl(${(hue+40)%360}, 75%, 40%))`;
        }

        // 数字に応じたサイズ
        function calculateSize(num) {
            const minSize = 45;
            const maxSize = 85;
            const size = minSize + (Math.log(Math.max(1, num)) / Math.log(200)) * (maxSize - minSize);
            return Math.max(minSize, Math.min(maxSize, size));
        }

        function startGame() {
            menuPanel.style.display = 'none';
            gameOverPanel.style.display = 'none';
            infoPanel.style.display = 'block';
            
            // クリーンアップ
            if (animationId) cancelAnimationFrame(animationId);
            clearInterval(spawnTimer);
            // 古い球を削除（デッドライン等は残す）
            document.querySelectorAll('.ball').forEach(el => el.remove());
            
            balls = [];
            score = 0;
            scoreText.innerText = `SCORE: ${score}`;
            gameActive = true;

            // 最初の球を落とす
            spawnBall();
            // 3.5秒ごとに新しい球が上から降ってくる
            spawnTimer = setInterval(spawnBall, 3500);

            animate();
        }

        function backToMenu() {
            gameActive = false;
            clearInterval(spawnTimer);
            if (animationId) cancelAnimationFrame(animationId);
            document.querySelectorAll('.ball').forEach(el => el.remove());
            balls = [];
            infoPanel.style.display = 'none';
            gameOverPanel.style.display = 'none';
            menuPanel.style.display = 'flex';
        }

        // 球の生成
        function spawnBall() {
            if (!gameActive) return;
            // 10〜150の範囲でランダムな数字の球を上部に生成
            const num = Math.floor(Math.random() * 141) + 10;
            const size = calculateSize(num);
            const x = Math.random() * (STAGE_WIDTH - size);
            createBallElement(num, x, -size);
        }

        function createBallElement(num, x, y) {
            const size = calculateSize(num);
            const radius = size / 2;

            const el = document.createElement('div');
            el.className = 'ball';
            el.innerText = num;
            el.style.width = `${size}px`;
            el.style.height = `${size}px`;
            el.style.fontSize = `${Math.max(14, size / 2.5)}px`;
            el.style.background = getBallColor(num);

            stage.appendChild(el);

            const ballObj = {
                num: num,
                element: el,
                size: size,
                radius: radius,
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: 1.5, // 下への基本落下速度
                clickTimeout: null // シングル/ダブルクリック判別用
            };

            // クリック/ダブルクリックイベントの制御
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!gameActive) return;

                if (ballObj.clickTimeout) {
                    // ダブルクリック確定（足し算分解）
                    clearTimeout(ballObj.clickTimeout);
                    ballObj.clickTimeout = null;
                    splitBall(ballObj, 'sum');
                } else {
                    // シングルクリックの保留
                    ballObj.clickTimeout = setTimeout(() => {
                        // シングルクリック確定（因数分解）
                        ballObj.clickTimeout = null;
                        splitBall(ballObj, 'factor');
                    }, 250); // 250ms待ってダブルクリックが来なければ実行
                }
            });

            balls.push(ballObj);
        }

        // 分解処理（type: 'factor' = 因数分解, 'sum' = 足し算）
        function splitBall(ball, type) {
            let pairs = null;
            if (type === 'factor') {
                pairs = getFactorPair(ball.num);
                if (!pairs) {
                    // 素数の場合は因数分解できないのでちょっと跳ねる演出
                    ball.vy = -4;
                    return;
                }
            } else {
                pairs = getSumPair(ball.num);
                if (!pairs) return; // 2以下の場合は足し算分解不可
            }

            const [f1, f2] = pairs;
            const centerX = ball.x + ball.radius;
            const centerY = ball.y + ball.radius;

            // 元の球を削除
            if (ball.element.parentNode) stage.removeChild(ball.element);
            balls = balls.filter(b => b !== ball);

            // 分解した2つの球を生成（少し左右に散らす）
            createBallElement(f1, centerX - ball.radius, centerY - ball.radius);
            createBallElement(f2, centerX, centerY - ball.radius);
            
            // 新しく作られた2つの球に外向きの速度を与える
            const last2 = balls.slice(-2);
            if (last2.length === 2) {
                last2[0].vx = -3; last2[0].vy = -2;
                last2[1].vx = 3;  last2[1].vy = -2;
            }

            score += 5; // 分解ボーナス
            scoreText.innerText = `SCORE: ${score}`;
        }

        // 消滅エフェクト
        function triggerPopEffect(x, y, size) {
            const effect = document.createElement('div');
            effect.className = 'pop-effect';
            effect.style.width = `${size}px`;
            effect.style.height = `${size}px`;
            effect.style.left = `${x}px`;
            effect.style.top = `${y}px`;
            stage.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }

        // メインループ
        function animate() {
            if (!gameActive) return;

            const height = window.innerHeight;
            let checkGameOver = false;

            // 1. 移動と壁・床との衝突
            balls.forEach(b => {
                b.x += b.vx;
                b.y += b.vy;
                
                // 重力（落ちゲーなので少しずつ加速）
                b.vy += 0.05;

                // 左右の壁での反射
                if (b.x < 0) { b.x = 0; b.vx *= -0.6; }
                else if (b.x + b.size > STAGE_WIDTH) { b.x = STAGE_WIDTH - b.size; b.vx *= -0.6; }

                // 底（床）でのバウンド、または積み重なり
                if (b.y + b.size > height) {
                    b.y = height - b.size;
                    b.vy *= -0.3; // 地面に着くと弾まなくなる
                    b.vx *= 0.8;  // 摩擦
                }

                // デッドラインを超えて静止、または積み上がっているかチェック
                if (b.y < DEAD_LINE_Y && b.vy < 0.5) {
                    checkGameOver = true;
                }

                b.element.style.left = `${b.x}px`;
                b.element.style.top = `${b.y}px`;
            });

            // 2. 球同士の衝突物理 ＆ 「同じ数字」の消滅処理
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];

                    const c1x = b1.x + b1.radius;
                    const c1y = b1.y + b1.radius;
                    const c2x = b2.x + b2.radius;
                    const c2y = b2.y + b2.radius;

                    const dx = c2x - c1x;
                    const dy = c2y - c1y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = b1.radius + b2.radius;

                    if (distance < minDistance) {
                        // 【コア規則】同じ数字なら消滅！
                        if (b1.num === b2.num) {
                            triggerPopEffect(c1x, c1y, b1.size);
                            triggerPopEffect(c2x, c2y, b2.size);

                            if (b1.element.parentNode) stage.removeChild(b1.element);
                            if (b2.element.parentNode) stage.removeChild(b2.element);

                            balls = balls.filter(b => b !== b1 && b !== b2);
                            
                            score += b1.num * 2; // 数字が大きいほど高得点！
                            scoreText.innerText = `SCORE: ${score}`;
                            
                            // 配列の要素が減ったためループを抜けてリスタート
                            break;
                        }

                        // 違う数字なら物理的な押し出しと跳ね返り
                        const overlap = minDistance - distance;
                        const nx = dx / (distance || 1);
                        const ny = dy / (distance || 1);

                        b1.x -= nx * overlap * 0.5;
                        b1.y -= ny * overlap * 0.5;
                        b2.x += nx * overlap * 0.5;
                        b2.y += ny * overlap * 0.5;

                        const kx = b1.vx - b2.vx;
                        const ky = b1.vy - b2.vy;
                        const p = 2 * (nx * kx + ny * ky) / 2;

                        b1.vx -= p * nx * 0.8;
                        b1.vy -= p * ny * 0.8;
                        b2.vx += p * nx * 0.8;
                        b2.vy += p * ny * 0.8;
                    }
                }
            }

            // ゲームオーバー判定
            if (checkGameOver) {
                // すぐに終了させず、少しの間ラインを超え続けたらゲームオーバーにする
                let penaltyCount = balls.filter(b => b.y < DEAD_LINE_Y && Math.abs(b.vy) < 0.2).length;
                if (penaltyCount > 0) {
                    endGame();
                    return;
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnTimer);
            if (animationId) cancelAnimationFrame(animationId);
            
            infoPanel.style.display = 'none';
            gameOverPanel.style.display = 'block';
            finalScoreText.innerText = `最終スコア: ${score} 点`;
        }
    </script>
</body>
</html>
