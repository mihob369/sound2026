<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Generator</title>

<style>
:root{
    --bg:#f3f4f6;
    --panel:#ffffff;
    --panel2:#e5e7eb;
    --text:#111827;
    --accent:#2563eb;
    --border:#d1d5db;
    --muted:#64748b;
}

body.dark{
    --bg:#111827;
    --panel:#1f2937;
    --panel2:#374151;
    --text:#f3f4f6;
    --accent:#3b82f6;
    --border:#4b5563;
    --muted:#94a3b8;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI",sans-serif;
    transition:.3s;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.toolbar{
    position:sticky;
    top:0;
    z-index:100;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    margin-bottom:20px;
}

.toolbar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.toolbar-header h1{
    margin:0;
    font-size:24px;
}

.grid{
    display:grid;
    grid-template-columns:500px 180px;
    gap:20px;
    margin-bottom:15px;
}

.filename-group{
    display:flex;
    align-items:center;
    gap:8px;
}

input,
select,
textarea{
    border:none;
    outline:none;
}

input,
select{
    width:100%;
    padding:10px;
    border-radius:8px;
    background:var(--panel2);
    color:var(--text);
}

.extension{
    min-width:70px;
    font-weight:bold;
}

.notice{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
}

button{
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:white;
    padding:10px 16px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    opacity:.9;
}

.theme-btn{
    background:#64748b;
}

.download-row{
    margin-bottom:12px;
}

.stats{
    color:var(--muted);
    font-size:14px;
}

.dropzone{
    border:2px dashed var(--border);
    border-radius:12px;
    padding:15px;
    text-align:center;
    margin-bottom:20px;
    color:var(--muted);
    transition:.2s;
}

.dropzone.dragover{
    border-color:var(--accent);
    background:rgba(59,130,246,.08);
}

.editor-area{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.editor-header,
.preview-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.editor-header h3,
.preview-header h3{
    margin:0;
}

.editor-tools{
    display:flex;
    gap:8px;
}

textarea{
    width:100%;
    min-height:70vh;
    resize:vertical;
    padding:15px;
    border-radius:12px;
    background:var(--panel);
    color:var(--text);
    font-family:Consolas,monospace;
    font-size:14px;
}

.preview{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #d1d5db;
}

iframe{
    width:100%;
    min-height:70vh;
    border:none;
    background:#fff;
}

#toast{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#16a34a;
    color:#fff;
    padding:12px 18px;
    border-radius:10px;
    box-shadow:0 5px 18px rgba(0,0,0,.2);

    opacity:0;
    transform:translateY(20px);
    transition:.3s;

    z-index:9999;
    pointer-events:none;
}

#toast.show{
    opacity:1;
    transform:translateY(0);
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .editor-area{
        grid-template-columns:1fr;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="toolbar">

        <div class="toolbar-header">

            <h1>📄 File Generator</h1>

            <button
                class="theme-btn"
                onclick="toggleTheme()">
                🎨 テーマ
            </button>

        </div>

        <div class="grid">

            <div>

                <label>ファイル名</label>

                <div class="filename-group">

                    <input
                        type="text"
                        id="filename"
                        placeholder="ファイル名を入力">

                    <span
                        class="extension"
                        id="extension">
                        .html
                    </span>

                </div>

                <div class="notice">
                    ※拡張子は自動付与されます
                </div>

            </div>

            <div>

                <label>形式</label>

                <select id="filetype">
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="js">JavaScript</option>
                    <option value="json">JSON</option>
                    <option value="md">Markdown</option>
                    <option value="txt">Text</option>
                </select>

            </div>

        </div>

        <div class="download-row">

            <button onclick="downloadFile()">
                📄 ファイル生成
            </button>

            <div class="notice">
                ※クリックするとファイルが生成され、自動的にダウンロードされます
            </div>

        </div>

        <div class="stats">
            <span id="chars">文字数：0</span>
            ｜ 
            <span id="lines">行数：1</span>
        </div>

    </div>

    <div id="dropzone" class="dropzone">
        HTML / CSS / JS / JSON / TXT / MD ファイルをドラッグ＆ドロップ
    </div>

    <div class="editor-area">

        <div>

            <div class="editor-header">

                <h3>コード</h3>

                <div class="editor-tools">

                    <button onclick="copyContent()">
                        📋 コピー
                    </button>

                    <button onclick="clearContent()">
                        🗑 クリア
                    </button>

                </div>

            </div>

            <textarea
                id="content"
                placeholder="ここにコードやテキストを入力または貼り付けてください"></textarea>

        </div>

        <div>

            <div class="preview-header">

                <h3>簡易プレビュー</h3>

                <button onclick="updatePreview()">
                    🔄 更新
                </button>

            </div>

            <div class="preview">
                <iframe id="previewFrame"></iframe>
            </div>

        </div>

    </div>

</div>

<div id="toast"></div>

<script>

const content = document.getElementById("content");
const filename = document.getElementById("filename");
const filetype = document.getElementById("filetype");
const extension = document.getElementById("extension");
const dropzone = document.getElementById("dropzone");

filetype.addEventListener("change",()=>{

    extension.textContent = "." + filetype.value;

    saveData();

});

content.addEventListener("input",()=>{
    updateStats();
});

filename.addEventListener("input",saveData);

function updateStats(){

    const text = content.value;

    document.getElementById("chars").textContent =
        "文字数：" + text.length.toLocaleString();

    document.getElementById("lines").textContent =
        "行数：" + text.split("\n").length.toLocaleString();

    saveData();
}

function downloadFile(){

    const name = filename.value.trim();

    if(!name){

        alert("ファイル名を入力してください");

        return;
    }

    const blob = new Blob(
        [content.value],
        {
            type:"text/plain;charset=utf-8"
        }
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download =
        name + "." + filetype.value;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(link.href);

    showToast(
        "✅ " +
        name +
        "." +
        filetype.value +
        " を生成しました"
    );
}

async function copyContent(){

    try{

        await navigator.clipboard.writeText(
            content.value
        );

        showToast("✅ コピーしました");

    }catch{

        alert("コピーに失敗しました");

    }
}

function clearContent(){

    if(confirm("内容を削除しますか？")){

        content.value = "";

        updateStats();

        document.getElementById("previewFrame").srcdoc = "";

        showToast("✅ 内容をクリアしました");
    }
}

function toggleTheme(){

    document.body.classList.toggle("dark");

    saveData();
}

function saveData(){

    localStorage.setItem(
        "fg_content",
        content.value
    );

    localStorage.setItem(
        "fg_filename",
        filename.value
    );

    localStorage.setItem(
        "fg_type",
        filetype.value
    );

    localStorage.setItem(
        "fg_theme",
        document.body.classList.contains("dark")
            ? "dark"
            : "light"
    );
}

function loadData(){

    const savedContent =
        localStorage.getItem("fg_content");

    const savedFilename =
        localStorage.getItem("fg_filename");

    const savedType =
        localStorage.getItem("fg_type");

    const savedTheme =
        localStorage.getItem("fg_theme");

    if(savedContent){
        content.value = savedContent;
    }

    if(savedFilename){
        filename.value = savedFilename;
    }

    if(savedType){
        filetype.value = savedType;
    }

    if(savedTheme === "dark"){
        document.body.classList.add("dark");
    }

    extension.textContent =
        "." + filetype.value;

    updateStats();
}

function updatePreview(){

    const frame =
        document.getElementById("previewFrame");

    if(filetype.value === "html"){

        frame.srcdoc = content.value;

    }else{

        frame.srcdoc = `
        <html>
            <body style="font-family:sans-serif;padding:20px;">
                <h3>簡易プレビュー</h3>
                <p>HTML形式のみレンダリング表示されます。</p>
                <hr>
                <pre>${escapeHtml(content.value)}</pre>
            </body>
        </html>
        `;
    }

    showToast("✅ プレビューを更新しました");
}

function escapeHtml(str){

    return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function showToast(message){

    const toast =
        document.getElementById("toast");

    toast.textContent = message;

    toast.classList.add("show");

    clearTimeout(
        window.toastTimer
    );

    window.toastTimer =
        setTimeout(()=>{

            toast.classList.remove("show");

        },3000);
}

document.addEventListener("dragover",(e)=>{
    e.preventDefault();
});

dropzone.addEventListener("dragover",()=>{
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave",()=>{
    dropzone.classList.remove("dragover");
});

document.addEventListener("drop",(e)=>{

    e.preventDefault();

    dropzone.classList.remove("dragover");

    const file =
        e.dataTransfer.files[0];

    if(!file){
        return;
    }

    const reader =
        new FileReader();

    reader.onload = (event)=>{

        content.value =
            event.target.result;

        const parts =
            file.name.split(".");

        if(parts.length > 1){

            const ext =
                parts.pop();

            const baseName =
                parts.join(".");

            filename.value =
                baseName;

            const allowed = [
                "html",
                "css",
                "js",
                "json",
                "md",
                "txt"
            ];

            if(
                allowed.includes(ext)
            ){
                filetype.value = ext;
            }

            extension.textContent =
                "." + filetype.value;
        }

        updateStats();

        showToast(
            "✅ ファイルを読み込みました"
        );
    };

    reader.readAsText(file);
});

loadData();

</script>

</body>
</html>
